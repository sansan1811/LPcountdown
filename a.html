<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer Premium</title>
    <style>
      /* Menggunakan font sistem yang bersih dan modern */
      body {
        margin: 0;
        padding: 0;
        background: transparent; /* Supaya menyatu dengan background Canva Anda */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* Wadah utama timer */
      .timer-container {
        display: flex;
        gap: 15px; /* Jarak antara kotak menit dan detik */
      }

      /* Desain kotak untuk masing-masing waktu */
      .time-box {
        background: #ffffff; /* Warna dasar kotak (bisa diganti sesuai tema LP) */
        border: 2px solid #db3e3d; /* Garis tepi dengan warna aksen marketing */
        border-radius: 12px;
        padding: 10px 20px;
        min-width: 80px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(255, 0, 85, 0.15); /* Efek bayangan halus */
      }

      /* Desain angka */
      .number {
        font-size: 48px;
        font-weight: 800;
        color: #db3e3d; /* Warna hot pink untuk urgensi psikologi pembeli */
        line-height: 1;
        margin-bottom: 4px;
        font-variant-numeric: tabular-nums; /* Mengunci angka agar tidak bergeser */
      }

      /* Desain label teks "menit" & "detik" di bawah angka */
      .label {
        font-size: 12px;
        font-weight: 700;
        color: #555555;
        text-transform: uppercase; /* Membuat huruf menjadi kapital */
        letter-spacing: 1px;
      }

      /* Titik dua (pemisah) yang estetik di antara dua kotak */
      .separator {
        font-size: 42px;
        font-weight: 800;
        color: #db3e3d;
        display: flex;
        align-items: center;
        margin-top: -10px; /* Menyelaraskan posisi vertikal */
      }
    </style>
  </head>
  <body>
    <div class="timer-container">
      <!-- Kotak Menit -->
      <div class="time-box">
        <div class="number" id="minutes">40</div>
        <div class="label">Menit</div>
      </div>

      <!-- Pemisah Titik Dua -->
      <div class="separator">:</div>

      <!-- Kotak Detik -->
      <div class="time-box">
        <div class="number" id="seconds">00</div>
        <div class="label">Detik</div>
      </div>
    </div>

    <script>
      const COUNTDOWN_TIME_MINUTES = 40; // Tetap 2 menit untuk uji coba
      const minutesElement = document.getElementById("minutes");
      const secondsElement = document.getElementById("seconds");

      let endTime;

      function startNewTimer() {
        const currentTime = new Date().getTime();
        endTime = currentTime + COUNTDOWN_TIME_MINUTES * 60 * 1000;
        localStorage.setItem("beautiful_2min_countdown", endTime);
      }

      endTime = localStorage.getItem("beautiful_2min_countdown");

      if (!endTime) {
        startNewTimer();
      }

      function updateCountdown() {
        const now = new Date().getTime();
        let distance = endTime - now;

        // Jika waktu habis, auto-reset ke 2 menit lagi
        if (distance <= 0) {
          startNewTimer();
          distance = endTime - now;
        }

        let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        let seconds = Math.floor((distance % (1000 * 60)) / 1000);

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        // Masukkan angka ke elemen kotak masing-masing
        minutesElement.innerHTML = minutes;
        secondsElement.innerHTML = seconds;
      }

      updateCountdown();
      const timerInterval = setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
